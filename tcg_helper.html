<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TCG Helper">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="appicon.png">
<title>🃏 TCG Helper — Crustle & Slowking (PT-BR)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:#0d0e11; --surface:#15161b; --card:#1c1e25; --card2:#262932;
    --line:rgba(255,255,255,.08); --text:#e8eaef; --muted:#9298a6;
    --S:#34d399; --A:#fbbf24; --C:#fb7185;
    --accent:#4ade80; --accent-soft:rgba(74,222,128,.16);
    --sh:0 2px 10px rgba(0,0,0,.35);
  }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; min-height: 100dvh;
  }
  .phone {
    width: 100%; max-width: 460px; min-height: 100vh; min-height: 100dvh;
    position: relative; overflow: hidden; display: flex; flex-direction: column;
    background: var(--surface); box-shadow: 0 0 60px rgba(0,0,0,.6);
    animation: appin .5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes appin { from { opacity: 0; } }

  .brand { display: flex; justify-content: center; padding: 2px 0 12px; }
  .brand-logo { height: 56px; width: auto; max-width: 82%; object-fit: contain; display: block; }
  .deck-label { font-size: 12px; font-weight: 700; color: var(--muted); margin: 0 2px 8px; }
  .head { position: sticky; top: 0; z-index: 12;
    background: rgba(21,22,27,.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line); padding: 12px 14px 0; }

  /* Seletor de deck por ícones */
  .deckrow { display: flex; gap: 8px; margin-bottom: 12px; }
  .deckbtn { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 9px 4px; border-radius: 15px; background: var(--card); border: 1.5px solid var(--line); cursor: pointer;
    transition: transform .1s ease, border-color .15s, background .15s; box-shadow: var(--sh); }
  .deckbtn:active { transform: scale(.95); }
  .deckbtn.active { border-color: var(--accent); background: var(--accent-soft); }
  .dicon { width: 40px; height: 40px; object-fit: contain; display: block; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
  .demoji { font-size: 26px; line-height: 40px; }
  .dlabel { font-size: 10.5px; font-weight: 800; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .deckbtn.active .dlabel { color: var(--text); }

  /* Hero do deck */
  .topbar { position: relative; overflow: hidden; padding: 4px 4px 12px; background: linear-gradient(150deg, var(--accent-soft), transparent 72%); border-radius: 12px; }
  .tb-row { display: flex; align-items: center; gap: 10px; }
  .tb-title { font-size: 19px; font-weight: 800; letter-spacing: .2px; }
  .tb-wr { margin-left: auto; font-size: 13px; font-weight: 800; color: var(--accent); background: var(--accent-soft);
    padding: 5px 11px; border-radius: 99px; border: 1.5px solid var(--accent); white-space: nowrap; }
  .tb-tag { font-size: 12px; color: var(--muted); margin-top: 5px; display: flex; align-items: center; gap: 6px; }

  /* Abas (2) */
  .tabbar { padding: 8px 0 12px; }
  .seg { position: relative; display: flex; background: var(--card2); border: 1px solid var(--line); border-radius: 13px; padding: 4px; }
  .seg-btn { flex: 1; position: relative; z-index: 2; background: none; border: none; color: var(--muted);
    font-weight: 800; font-size: 13.5px; padding: 9px 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: color .2s; }
  .seg-btn.active { color: #10131a; }
  .seg-ind { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc((100% - 8px) / 2); border-radius: 9px;
    background: var(--accent); z-index: 1; box-shadow: 0 3px 12px var(--accent-soft);
    transition: transform .26s cubic-bezier(.3,.85,.3,1); }

  /* Screen */
  .screen { flex: 1; padding: 16px 14px 28px; }
  .view { animation: viewin .32s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes viewin { from { opacity: 0; transform: translateY(10px); } }

  /* Busca + chips */
  .searchwrap { position: relative; margin-bottom: 12px; }
  .searchwrap::before { content: "🔎"; position: absolute; left: 13px; top: 50%; transform: translateY(-50%); opacity: .55; font-size: 13px; }
  .searchwrap input { width: 100%; background: var(--card); border: 1px solid var(--line); color: var(--text); padding: 12px 14px 12px 38px; border-radius: 14px; font-size: 15px; }
  .searchwrap input:focus { outline: none; border-color: var(--accent); }
  .searchwrap input::placeholder { color: #6b7280; }
  .chips { display: flex; gap: 8px; margin-bottom: 14px; }
  .chip { flex: 1; text-align: center; padding: 9px 6px; border-radius: 12px; background: var(--card); border: 1px solid var(--line); color: var(--muted); font-size: 13px; font-weight: 800; cursor: pointer; transition: transform .08s; }
  .chip:active { transform: scale(.96); }
  .chip.active[data-t="all"] { background: var(--accent); border-color: var(--accent); color: #10131a; }
  .chip.active[data-t="S"] { background: var(--S); border-color: var(--S); color: #06251a; }
  .chip.active[data-t="A"] { background: var(--A); border-color: var(--A); color: #2a1d00; }
  .chip.active[data-t="C"] { background: var(--C); border-color: var(--C); color: #2a0712; }

  /* Tier + matchup row */
  .tier-h { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin: 16px 2px 9px; }
  .tier-h.S { color: var(--S); } .tier-h.A { color: var(--A); } .tier-h.C { color: var(--C); }
  .mrow { width: 100%; text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 13px 14px; margin-bottom: 10px; cursor: pointer; display: block; color: var(--text); box-shadow: var(--sh); animation: rowin .4s cubic-bezier(.2,.8,.2,1) both; transition: transform .08s, border-color .15s; }
  .mrow:active { transform: scale(.985); }
  .mrow:hover { border-color: var(--accent); }
  @keyframes rowin { from { opacity: 0; transform: translateY(12px); } }
  .mrow-top { display: flex; align-items: center; gap: 9px; }
  .mon-icon { width: 32px; height: 32px; flex: 0 0 auto; object-fit: contain; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
  .mrow-name { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.25; }
  .tierchip { font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 99px; flex: 0 0 auto; }
  .tierchip.S { background: rgba(52,211,153,.18); color: var(--S); }
  .tierchip.A { background: rgba(251,191,36,.18); color: var(--A); }
  .tierchip.C { background: rgba(251,113,133,.18); color: var(--C); }
  .mrow-bottom { display: flex; align-items: center; gap: 10px; margin-top: 11px; }
  .mrow-coin { display: inline-flex; align-items: center; }
  .coin { width: 19px; height: 19px; flex: 0 0 auto; vertical-align: middle; }
  .wrbar { flex: 1; height: 8px; background: #0c0f15; border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .wrfill { display: block; height: 100%; border-radius: 99px; animation: wrgrow .75s cubic-bezier(.2,.85,.25,1) both; }
  @keyframes wrgrow { from { width: 0 !important; } }
  .wrfill.S { background: linear-gradient(90deg, #0e8f63, var(--S)); }
  .wrfill.A { background: linear-gradient(90deg, #a87a10, var(--A)); }
  .wrfill.C { background: linear-gradient(90deg, #a83a4c, var(--C)); }
  .wrlabel { font-size: 12px; font-weight: 800; min-width: 64px; text-align: right; }
  .wrlabel.S { color: var(--S); } .wrlabel.A { color: var(--A); } .wrlabel.C { color: var(--C); }

  /* Galeria */
  .gal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .gal-cat { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; color: var(--accent); margin: 6px 2px 10px; }
  .gal-imgwrap { position: relative; border-radius: 10px; overflow: hidden; background: var(--card2); aspect-ratio: 245 / 342; display: flex; align-items: center; justify-content: center; box-shadow: var(--sh); animation: rowin .4s ease both; }
  .gal-imgwrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gal-count { position: absolute; bottom: 5px; right: 5px; color: #10131a; font-weight: 800; font-size: 12px; padding: 1px 7px; border-radius: 10px; background: var(--accent); box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .gal-broken { font-size: 10px; text-align: center; padding: 6px; color: var(--muted); line-height: 1.3; }

  .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 14px; }

  /* Painel deslizante */
  .sheet { position: fixed; inset: 0; width: 100%; max-width: 460px; margin: 0 auto; z-index: 30;
    background: radial-gradient(130% 42% at 50% 0%, var(--accent-soft), transparent 55%), var(--surface);
    overflow-y: auto; padding: 18px 14px 28px;
    transform: translateX(36px); opacity: 0; pointer-events: none;
    transition: transform .3s cubic-bezier(.3,.85,.25,1), opacity .24s ease; }
  .sheet.open { transform: translateX(0); opacity: 1; pointer-events: auto; }
  .back { background: var(--card); border: 1px solid var(--line); color: var(--text); padding: 9px 15px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 6px; box-shadow: var(--sh); transition: transform .08s, border-color .15s; }
  .back:active { transform: scale(.96); } .back:hover { border-color: var(--accent); }
  .mhead { margin-bottom: 16px; }
  .mtitle { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 11px; display: flex; align-items: center; gap: 10px; }
  .mtitle .mon-icon { width: 40px; height: 40px; }
  .mbadges { display: flex; flex-wrap: wrap; gap: 8px; }
  .tierbadge { font-size: 12px; font-weight: 800; padding: 5px 11px; border-radius: 99px; }
  .tierbadge.S { background: rgba(52,211,153,.18); color: var(--S); }
  .tierbadge.A { background: rgba(251,191,36,.18); color: var(--A); }
  .tierbadge.C { background: rgba(251,113,133,.18); color: var(--C); }
  .pill { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 99px; background: var(--card2); color: var(--muted); border: 1px solid var(--line); display: inline-flex; align-items: center; gap: 5px; }
  .pill.first { background: rgba(251,113,133,.15); color: #fda4af; border-color: rgba(251,113,133,.3); }
  .pill.second { background: rgba(96,165,250,.15); color: #93c5fd; border-color: rgba(96,165,250,.3); }
  .wrcard { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; margin-bottom: 16px; box-shadow: var(--sh); }
  .wrcard-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .wrcard-top .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .wrbig { font-size: 26px; font-weight: 800; }
  .wrbig.S { color: var(--S); } .wrbig.A { color: var(--A); } .wrbig.C { color: var(--C); }
  .wrbar.big { height: 14px; }
  .sect { border-radius: 18px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid var(--line); animation: viewin .4s ease both; }
  .sect.obj { background: rgba(52,211,153,.08); border-color: rgba(52,211,153,.26); }
  .sect.cui { background: rgba(251,113,133,.07); border-color: rgba(251,113,133,.26); }
  .sect-h { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 11px; }
  .sect.obj .sect-h { color: var(--S); } .sect.cui .sect-h { color: var(--C); }
  .sect ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .sect li { font-size: 14px; line-height: 1.45; padding-left: 22px; position: relative; }
  .sect.obj li::before { content: "✓"; position: absolute; left: 1px; color: var(--S); font-weight: 800; }
  .sect.cui li::before { content: "!"; position: absolute; left: 4px; color: var(--C); font-weight: 800; }

  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333842; border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    *, .mrow, .view, .wrfill, .phone { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="phone" id="phone">

    <div class="brand"><img class="brand-logo" src="ShockTCGHelperLogo.png" alt="Shock TCG Helper"></div>

  </header>
  <main class="screen" id="screen"></main>
  <section class="sheet" id="sheet" aria-hidden="true"></section>
</div>

const DECK_INFO = {
  crustle:   { short: 'Crustle',  tag: 'Parede single-prize · imune a ataques de ex', overall: '~57%' },
  slowking:  { short: 'Slowking', tag: 'Combo Metagross 300 · Psíquico bate Lutador', overall: '~52%' },
  dragapult: { short: 'Pult',     tag: 'Spread + trava stax · Munkidori shift', overall: '~53%' },
  zam:       { short: 'Pult+Zam', tag: 'Spread + finisher non-ex (Alakazam)', overall: 'est.' }
};
const TABS = [
  { id: 'matchups', label: '⚔️ Matchups' },
  { id: 'galeria', label: '🃏 Galeria' }
];

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function hexToRgba(hex, a) {
  let h = hex.replace('#', '');
  if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
  const n = parseInt(h, 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}
function deckEmoji(k) { const l = DECKS[k].label; const sp = l.indexOf(' '); return sp > 0 ? l.slice(0, sp) : '🃏'; }
function deckName(k) { const l = DECKS[k].label; const sp = l.indexOf(' '); return sp > 0 ? l.slice(sp + 1) : l; }
function wrNum(wr) {
  const nums = String(wr).match(/\d+/g);
  if (!nums) return null;
  if (nums.length >= 2) return Math.round((parseInt(nums[0]) + parseInt(nums[1])) / 2);
  return parseInt(nums[0]);
}
function wrWidth(wr) { const n = wrNum(wr); return n == null ? 0 : Math.max(4, Math.min(100, n)); }
function coinText(c) { return c === 'first' ? 'Jogar primeiro' : 'Jogar segundo'; }

// Pokémon principal de cada arquétipo de oponente -> nº da Dex (pega o que aparece mais à esquerda no nome)
const MON_DEX = [
  ['beedrill', 15], ['dragapult', 887], ['garchomp', 445], ['alakazam', 65], ['venusaur', 3],
  ['raging bolt', 1021], ['zoroark', 571], ['mewtwo', 150], ['honchkrow', 430], ['grimmsnarl', 861],
  ['slowking', 199], ['crustle', 558], ['meganium', 154], ['hydrapple', 1019], ['arboliva', 930],
  ['starmie', 121], ['crobat', 169], ['typhlosion', 157], ['greninja', 658], ['lucario', 448],
  ['lopunny', 428], ['kangaskhan', 115], ['festival', 1011], ['ceruledge', 937], ['archaludon', 1018],
  ['cinccino', 573], ['trevenant', 709], ['barbaracle', 689], ['diancie', 719]
];
function matchupDex(name) {
  const s = String(name).toLowerCase();
  let best = -1, dex = null;
  for (let i = 0; i < MON_DEX.length; i++) {
    const idx = s.indexOf(MON_DEX[i][0]);
    if (idx !== -1 && (best === -1 || idx < best)) { best = idx; dex = MON_DEX[i][1]; }
  }
  return dex;
}
function monIcon(name) {
  const dex = matchupDex(name);
  if (!dex) return '';
  return '<img class="mon-icon" alt="" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + dex + '.png" onerror="this.style.display=\'none\'">';
}

// Moeda: ouro = joga 1º, prata = joga 2º (SVG inline, sem arquivo)
function coinIcon(c) {
  const gold = c === 'first';
  const fill = gold ? '#f5c518' : '#d6dae1';
  const ring = gold ? '#a9760a' : '#8b919b';
  const tx = gold ? '#6e4a00' : '#3a3f48';
  const num = gold ? '1' : '2';
  return '<svg class="coin" viewBox="0 0 24 24" aria-hidden="true">' +
    '<circle cx="12" cy="12" r="11" fill="' + fill + '" stroke="' + ring + '" stroke-width="1.6"/>' +
    '<circle cx="12" cy="12" r="8" fill="none" stroke="#ffffff" stroke-opacity=".4" stroke-width="1"/>' +
    '<text x="12" y="16.5" text-anchor="middle" font-size="13" font-weight="900" fill="' + tx + '">' + num + '</text></svg>';
}
function deckCoinMajority(deck) {
  const ms = DECKS[deck].matchups; let first = 0, second = 0;
  ms.forEach(function (m) { if (m.coinFlip === 'first') first++; else second++; });
  return first > second ? 'first' : 'second';
}

function renderDeckrow() {
  let html = '';
  DECK_ORDER.forEach(function (k) {
    const accent = DECKS[k].accent;
    const info = DECK_INFO[k] || {};
    const short = info.short || deckName(k);
    html += '<button class="deckbtn' + (k === currentDeck ? ' active' : '') + '" data-deck="' + k + '" onclick="switchDeck(\'' + k + '\')" ' +
      'style="--accent:' + accent + ';--accent-soft:' + hexToRgba(accent, 0.16) + '">' +
      '<img class="dicon" src="deck-' + k + '.png" alt="' + esc(short) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'inline-block\'">' +
      '<span class="demoji" style="display:none">' + deckEmoji(k) + '</span>' +
      '<span class="dlabel">' + esc(short) + '</span></button>';
  });
  document.getElementById('deckrow').innerHTML = html;
}
function updateDeckActive() {
  document.querySelectorAll('.deckbtn').forEach(function (b) { b.classList.toggle('active', b.dataset.deck === currentDeck); });
}

function renderTopbar() {
  const info = DECK_INFO[currentDeck] || { overall: '' };
  const maj = deckCoinMajority(currentDeck);
  const majText = maj === 'first' ? 'Joga primeiro na maioria' : 'Joga segundo na maioria';
  document.getElementById('topbar').innerHTML =
    '<div class="tb-row"><span class="tb-title">' + esc(deckName(currentDeck)) + '</span>' +
    (info.overall ? '<span class="tb-wr">' + esc(info.overall) + '</span>' : '') + '</div>' +
    '<div class="tb-tag">' + coinIcon(maj) + '<span>' + majText + '</span></div>';
}

function renderTabbar() {
  let btns = '';
  TABS.forEach(function (t) {
    btns += '<button class="seg-btn' + (t.id === currentTab ? ' active' : '') + '" data-tab="' + t.id + '" onclick="setTab(\'' + t.id + '\')">' + t.label + '</button>';
  });
  document.getElementById('tabbar').innerHTML = '<div class="seg">' + btns + '<span class="seg-ind"></span></div>';
  updateSegIndicator();
}
function updateSegIndicator() {
  const idx = TABS.map(function (t) { return t.id; }).indexOf(currentTab);
  const ind = document.querySelector('.seg-ind');
  if (ind) ind.style.transform = 'translateX(' + (idx * 100) + '%)';
  document.querySelectorAll('.seg-btn').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === currentTab); });
}

function setTheme(accent) {
  const phone = document.getElementById('phone');
  phone.style.setProperty('--accent', accent);
  phone.style.setProperty('--accent-soft', hexToRgba(accent, 0.16));
}

function switchDeck(deck) {
  currentDeck = deck;
  currentTab = 'matchups';
  selectedId = null;
  searchText = '';
  tierFilter = 'all';
  localStorage.setItem('tcg-current-deck', deck);
  setTheme(DECKS[deck].accent);
  closeSheet();
  updateDeckActive();
  renderTopbar();
  renderTabbar();
  renderScreen();
  window.scrollTo(0, 0);
}

function setTab(tab) {
  if (tab === currentTab) return;
  currentTab = tab;
  updateSegIndicator();
  renderScreen();
}

function renderScreen() {
  const screen = document.getElementById('screen');
  if (currentTab === 'matchups') {
    screen.innerHTML = '<div class="view">' + buildMatchupsView() + '</div>';
    const si = document.getElementById('search');
    if (si) si.addEventListener('input', function (e) { searchText = e.target.value; document.getElementById('mlist').innerHTML = buildList(); });
  } else {
    screen.innerHTML = '<div class="view">' + buildGaleria() + '</div>';
  }
}

function matchupRow(m, i) {
  const coin = coinIcon(m.coinFlip);
  const delay = i < 12 ? (i * 28) : 0;
  return '<button class="mrow" style="animation-delay:' + delay + 'ms" onclick="renderMatchup(' + m.id + ')">' +
    '<div class="mrow-top">' + monIcon(m.name) + '<span class="mrow-name">' + esc(m.name) + '</span>' +
    '<span class="tierchip ' + m.tier + '">' + m.tier + '</span></div>' +
    '<div class="mrow-bottom"><span class="mrow-coin">' + coin + '</span>' +
    '<span class="wrbar"><span class="wrfill ' + m.tier + '" style="width:' + wrWidth(m.wr) + '%"></span></span>' +
    '<span class="wrlabel ' + m.tier + '">' + esc(m.wr) + '</span></div></button>';
}

function buildList() {
  const ms = DECKS[currentDeck].matchups;
  const f = searchText.toLowerCase();
  let filtered = ms.filter(function (m) { return m.name.toLowerCase().indexOf(f) !== -1; });
  if (tierFilter !== 'all') filtered = filtered.filter(function (m) { return m.tier === tierFilter; });
  const val = function (s) { const n = wrNum(s); return n == null ? -1 : n; };
  const tiers = { S: [], A: [], C: [] };
  filtered.forEach(function (m) { tiers[m.tier].push(m); });
  ['S', 'A', 'C'].forEach(function (t) { tiers[t].sort(function (a, b) { return val(b.wr) - val(a.wr); }); });
  const labels = { S: '🏆 Tier S — vitória provável', A: '⚖️ Tier A — equilibrado', C: '🔴 Tier C — difícil' };
  let out = '', i = 0;
  ['S', 'A', 'C'].forEach(function (t) {
    if (tiers[t].length) {
      out += '<div class="tier-h ' + t + '">' + labels[t] + '</div>';
      tiers[t].forEach(function (m) { out += matchupRow(m, i++); });
    }
  });
  return filtered.length ? out : '<div class="empty">Nenhum matchup encontrado.</div>';
}

function buildMatchupsView() {
  return '<div class="searchwrap"><input id="search" type="text" placeholder="Buscar oponente..." value="' + esc(searchText) + '"></div>' +
    '<div id="mlist">' + buildList() + '</div>';
}

function setTier(t) {
  tierFilter = (tierFilter === t ? 'all' : t);
  const chips = document.querySelectorAll('.chip');
  for (let i = 0; i < chips.length; i++) chips[i].classList.toggle('active', chips[i].dataset.t === tierFilter);
  document.getElementById('mlist').innerHTML = buildList();
}

function cardImg(setStr) {
  const parts = String(setStr).trim().split(/\s+/);
  if (parts.length < 2) return '';
  const set = parts[0].toUpperCase();
  const num = parts[1].replace(/\D/g, '').padStart(3, '0');
  return 'https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpci/' + set + '/' + set + '_' + num + '_R_EN_LG.png';
}

function buildGaleria() {
  const dl = DECKS[currentDeck].decklist;
  if (!dl) return '<div class="empty">Lista não cadastrada.</div>';
  let html = '';
  dl.groups.forEach(function (g) {
    html += '<div class="gal-cat">' + esc(g.type) + '</div><div class="gal-grid">';
    g.cards.forEach(function (c) {
      const url = cardImg(c.set);
      const fb = "this.parentNode.classList.add('gal-broken');this.parentNode.innerHTML='" + c.name.replace(/'/g, "\\'") + "<br>" + c.set + "'";
      html += '<div class="gal-imgwrap"><img loading="lazy" src="' + url + '" alt="' + esc(c.name) + '" title="' + esc(c.name) + ' (' + c.set + ')" onerror="' + fb + '"><span class="gal-count">' + c.n + '×</span></div>';
    });
    html += '</div>';
  });
  return html;
}

function renderMatchup(id) {
  selectedId = id;
  const m = DECKS[currentDeck].matchups.find(function (x) { return x.id === id; });
  if (!m) return;
  const obj = (m.objetivo || []).map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('');
  const cui = (m.cuidado || []).map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('');
  const sheet = document.getElementById('sheet');
  sheet.innerHTML =
    '<button class="back" onclick="closeSheet()">← Voltar</button>' +
    '<div class="mhead"><div class="mtitle">' + monIcon(m.name) + esc(m.name) + '</div><div class="mbadges">' +
    '<span class="tierbadge ' + m.tier + '">Tier ' + m.tier + '</span>' +
    '<span class="pill ' + m.coinFlip + '">' + coinIcon(m.coinFlip) + ' ' + coinText(m.coinFlip) + '</span>' +
    '<span class="pill">📈 Meta ' + esc(m.metaShare) + '</span></div></div>' +
    '<div class="wrcard"><div class="wrcard-top"><span class="lbl">Win rate</span>' +
    '<span class="wrbig ' + m.tier + '">' + esc(m.wr) + '</span></div>' +
    '<span class="wrbar big"><span class="wrfill ' + m.tier + '" style="width:' + wrWidth(m.wr) + '%"></span></span></div>' +
    (obj ? '<div class="sect obj"><div class="sect-h">🎯 Objetivo</div><ul>' + obj + '</ul></div>' : '') +
    (cui ? '<div class="sect cui"><div class="sect-h">⚠️ Cuidado</div><ul>' + cui + '</ul></div>' : '');
  sheet.setAttribute('aria-hidden', 'false');
  sheet.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  void sheet.offsetWidth;
  sheet.classList.add('open');
}

function closeSheet() {
  const sheet = document.getElementById('sheet');
  if (!sheet) return;
  sheet.classList.remove('open');
  sheet.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

// ——— PWA: service worker (só em HTTPS hospedado; ignorado em file://) ———
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', function () { navigator.serviceWorker.register('./sw.js').catch(function () {}); });
}

renderDeckrow();
switchDeck(currentDeck);
</script>
