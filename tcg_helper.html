<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TCG Helper">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="appicon.png">
<title>🃏 TCG Helper — Crustle & Slowking (PT-BR)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:#07090f; --card:#141b2c; --card2:#1a2336; --line:#ffffff14;
    --text:#e6ebf2; --muted:#8a98b5;
    --S:#34d399; --A:#fbbf24; --C:#fb7185;
    --accent:#4ade80; --accent-soft:rgba(74,222,128,.16);
  }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; min-height: 100dvh;
  }
  .phone {
    width: 100%; max-width: 460px; min-height: 100vh; min-height: 100dvh;
    position: relative; display: flex; flex-direction: column;
    background: radial-gradient(120% 55% at 50% -8%, var(--accent-soft), transparent 60%), #0a0f1a;
    box-shadow: 0 0 60px rgba(0,0,0,.6);
  }

  /* Topbar = hero do deck */
  .topbar {
    position: sticky; top: 0; z-index: 20; padding: 16px 18px 14px;
    background: linear-gradient(165deg, var(--accent-soft), rgba(10,15,26,.55) 75%), rgba(10,15,26,.88);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .tb-row { display: flex; align-items: center; gap: 10px; }
  .tb-emoji { font-size: 24px; line-height: 1; }
  .tb-title { font-size: 18px; font-weight: 800; letter-spacing: .2px; }
  .tb-wr { margin-left: auto; font-size: 13px; font-weight: 800; color: var(--accent);
    background: var(--accent-soft); padding: 5px 11px; border-radius: 99px; border: 1px solid var(--accent); white-space: nowrap; }
  .tb-tag { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Screen (rola na janela) */
  .screen { flex: 1; padding: 16px 14px 104px; }

  /* Busca */
  .searchwrap { position: relative; margin-bottom: 12px; }
  .searchwrap::before { content: "🔎"; position: absolute; left: 13px; top: 50%; transform: translateY(-50%); opacity: .6; font-size: 13px; }
  .searchwrap input { width: 100%; background: var(--card); border: 1px solid var(--line); color: var(--text);
    padding: 12px 14px 12px 38px; border-radius: 14px; font-size: 15px; }
  .searchwrap input:focus { outline: none; border-color: var(--accent); }

  /* Chips de tier */
  .chips { display: flex; gap: 8px; margin-bottom: 14px; }
  .chip { flex: 1; text-align: center; padding: 9px 6px; border-radius: 12px; background: var(--card);
    border: 1px solid var(--line); color: var(--muted); font-size: 13px; font-weight: 800; cursor: pointer; }
  .chip.active[data-t="all"] { background: var(--accent); border-color: var(--accent); color: #06203a; }
  .chip.active[data-t="S"]   { background: var(--S); border-color: var(--S); color: #062518; }
  .chip.active[data-t="A"]   { background: var(--A); border-color: var(--A); color: #2a1d00; }
  .chip.active[data-t="C"]   { background: var(--C); border-color: var(--C); color: #2a0712; }

  /* Cabeçalho de tier */
  .tier-h { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin: 16px 2px 9px; }
  .tier-h.S { color: var(--S); } .tier-h.A { color: var(--A); } .tier-h.C { color: var(--C); }

  /* Linha de matchup */
  .mrow { width: 100%; text-align: left; background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 13px 14px; margin-bottom: 10px; cursor: pointer; display: block;
    transition: transform .08s ease, border-color .15s ease; }
  .mrow:active { transform: scale(.99); }
  .mrow:hover { border-color: var(--accent); }
  .mrow-top { display: flex; align-items: center; gap: 8px; }
  .mrow-name { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.25; }
  .mrow-coin { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .tierchip { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 99px; }
  .tierchip.S { background: rgba(52,211,153,.18); color: var(--S); }
  .tierchip.A { background: rgba(251,191,36,.18); color: var(--A); }
  .tierchip.C { background: rgba(251,113,133,.18); color: var(--C); }
  .mrow-bottom { display: flex; align-items: center; gap: 10px; margin-top: 11px; }
  .wrbar { flex: 1; height: 8px; background: #0d1422; border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .wrfill { display: block; height: 100%; border-radius: 99px; }
  .wrfill.S { background: linear-gradient(90deg, #0e8f63, var(--S)); }
  .wrfill.A { background: linear-gradient(90deg, #a87a10, var(--A)); }
  .wrfill.C { background: linear-gradient(90deg, #a83a4c, var(--C)); }
  .wrlabel { font-size: 12px; font-weight: 800; min-width: 64px; text-align: right; }
  .wrlabel.S { color: var(--S); } .wrlabel.A { color: var(--A); } .wrlabel.C { color: var(--C); }

  /* Detalhe do matchup */
  .back { background: var(--card); border: 1px solid var(--line); color: var(--text); padding: 9px 15px;
    border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 16px;
    display: inline-flex; align-items: center; gap: 6px; }
  .back:hover { border-color: var(--accent); }
  .mhead { margin-bottom: 16px; }
  .mtitle { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 11px; }
  .mbadges { display: flex; flex-wrap: wrap; gap: 8px; }
  .tierbadge { font-size: 12px; font-weight: 800; padding: 5px 11px; border-radius: 99px; }
  .tierbadge.S { background: rgba(52,211,153,.18); color: var(--S); }
  .tierbadge.A { background: rgba(251,191,36,.18); color: var(--A); }
  .tierbadge.C { background: rgba(251,113,133,.18); color: var(--C); }
  .pill { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 99px;
    background: var(--card2); color: var(--muted); border: 1px solid var(--line); }
  .pill.first  { background: rgba(251,113,133,.15); color: #fda4af; border-color: rgba(251,113,133,.3); }
  .pill.second { background: rgba(96,165,250,.15); color: #93c5fd; border-color: rgba(96,165,250,.3); }

  .wrcard { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; margin-bottom: 16px; }
  .wrcard-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .wrcard-top .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .wrbig { font-size: 26px; font-weight: 800; }
  .wrbig.S { color: var(--S); } .wrbig.A { color: var(--A); } .wrbig.C { color: var(--C); }
  .wrbar.big { height: 14px; }

  .sect { border-radius: 18px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid var(--line); }
  .sect.obj { background: rgba(52,211,153,.07); border-color: rgba(52,211,153,.28); }
  .sect.cui { background: rgba(251,113,133,.07); border-color: rgba(251,113,133,.28); }
  .sect-h { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 11px; }
  .sect.obj .sect-h { color: var(--S); } .sect.cui .sect-h { color: var(--C); }
  .sect ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .sect li { font-size: 14px; line-height: 1.45; padding-left: 22px; position: relative; }
  .sect.obj li::before { content: "✓"; position: absolute; left: 1px; color: var(--S); font-weight: 800; }
  .sect.cui li::before { content: "!"; position: absolute; left: 4px; color: var(--C); font-weight: 800; }

  .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 14px; }

  /* Galeria (Meu Deck) */
  .gal-note { background: var(--card); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 12px; padding: 12px 14px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
  .dl-group { margin-bottom: 20px; }
  .dl-cat { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--line);
    padding-bottom: 6px; margin-bottom: 10px; color: var(--accent); }
  .gal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; }
  .gal-imgwrap { position: relative; border-radius: 8px; overflow: hidden; background: var(--card);
    aspect-ratio: 245 / 342; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
  .gal-imgwrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gal-count { position: absolute; bottom: 5px; right: 5px; color: #06203a; font-weight: 800; font-size: 12px;
    padding: 1px 7px; border-radius: 10px; background: var(--accent); box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .gal-broken { font-size: 10px; text-align: center; padding: 6px; color: var(--muted); line-height: 1.3; }

  /* Bottom nav */
  .bnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 460px; z-index: 40;
    display: flex; align-items: flex-end; justify-content: space-around; gap: 2px;
    background: rgba(13,19,32,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--line); padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px)); }
  .bnav-item { flex: 1; background: none; border: none; color: var(--muted); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; font-size: 11px; font-weight: 600; }
  .bnav-item .bemoji { font-size: 20px; line-height: 1; filter: grayscale(.45); opacity: .8; transition: all .15s ease; }
  .bnav-item.active { color: var(--accent); }
  .bnav-item.active .bemoji { filter: none; opacity: 1; transform: translateY(-1px); }
  .bnav-center { flex: 0 0 auto; background: none; border: none; cursor: pointer; margin: 0 4px -6px; padding: 0; }
  .pokeball { display: block; width: 52px; height: 52px; border-radius: 50%;
    background:
      radial-gradient(circle at center, #fff 0 6px, #111 6px 8.5px, rgba(0,0,0,0) 8.5px),
      linear-gradient(#ff5350 0 46%, #111 46% 54%, #f4f4f5 54% 100%);
    box-shadow: 0 6px 16px rgba(0,0,0,.5), 0 0 0 3px #0d1320, inset 0 0 0 2px #111; transition: transform .1s ease; }
  .bnav-center:active .pokeball { transform: scale(.93); }

  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d3a5f; border-radius: 4px; }
</style>
</head>
<body>

<div class="phone" id="phone">
  <header class="topbar" id="topbar"></header>
  <main class="screen" id="screen"></main>
  <nav class="bnav" id="bnav">
    <button class="bnav-item" data-deck="crustle" onclick="switchDeck('crustle')"><span class="bemoji">🦀</span><span>Crustle</span></button>
    <button class="bnav-item" data-deck="slowking" onclick="switchDeck('slowking')"><span class="bemoji">🐚</span><span>Slowking</span></button>
    <button class="bnav-center" onclick="showGallery()" aria-label="Meu Deck (galeria)"><span class="pokeball"></span></button>
    <button class="bnav-item" data-deck="dragapult" onclick="switchDeck('dragapult')"><span class="bemoji">🐉</span><span>Dragapult</span></button>

  </nav>
</div>

let currentDeck = localStorage.getItem('tcg-current-deck') || 'crustle';
let selectedId = null;
let searchText = '';
let tierFilter = 'all';

const DECK_INFO = {
  crustle:   { tag: 'Parede single-prize · imune a ataques de ex', overall: '~57%' },
  slowking:  { tag: 'Combo Metagross 300 · Psíquico bate Lutador', overall: '~52%' },
  dragapult: { tag: 'Spread + trava stax · Munkidori shift', overall: '~53%' },
  zam:       { tag: 'Spread + finisher non-ex (Alakazam)', overall: 'est.' }
};

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function hexToRgba(hex, a) {
  let h = hex.replace('#', '');
  if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
  const n = parseInt(h, 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}
function wrNum(wr) {
  const nums = String(wr).match(/\d+/g);
  if (!nums) return null;
  if (nums.length >= 2) return Math.round((parseInt(nums[0]) + parseInt(nums[1])) / 2);
  return parseInt(nums[0]);
}
function wrWidth(wr) { const n = wrNum(wr); return n == null ? 0 : Math.max(4, Math.min(100, n)); }
function coinText(c) { return c === 'first' ? 'Jogar primeiro' : 'Jogar segundo'; }

function setActiveNav() {
  const items = document.querySelectorAll('.bnav-item');
  for (let i = 0; i < items.length; i++) items[i].classList.toggle('active', items[i].dataset.deck === currentDeck);
}

function renderTopbar() {
  const label = DECKS[currentDeck].label;
  const info = DECK_INFO[currentDeck] || { tag: '', overall: '' };
  const sp = label.indexOf(' ');
  const emoji = sp > 0 ? label.slice(0, sp) : '🃏';
  const name = sp > 0 ? label.slice(sp + 1) : label;
  document.getElementById('topbar').innerHTML =
    '<div class="tb-row"><span class="tb-emoji">' + emoji + '</span>' +
    '<span class="tb-title">' + esc(name) + '</span>' +
    (info.overall ? '<span class="tb-wr">' + esc(info.overall) + '</span>' : '') + '</div>' +
    (info.tag ? '<div class="tb-tag">' + esc(info.tag) + '</div>' : '');
}

function switchDeck(deck) {
  currentDeck = deck;
  selectedId = null;
  searchText = '';
  tierFilter = 'all';
  localStorage.setItem('tcg-current-deck', deck);
  const accent = DECKS[deck].accent;
  const phone = document.getElementById('phone');
  phone.style.setProperty('--accent', accent);
  phone.style.setProperty('--accent-soft', hexToRgba(accent, 0.16));
  setActiveNav();
  renderTopbar();
  renderHome();
  window.scrollTo(0, 0);
}

function matchupRow(m) {
  const coin = m.coinFlip === 'first' ? '🪙 1º' : '🪙 2º';
  return '<button class="mrow" onclick="renderMatchup(' + m.id + ')">' +
    '<div class="mrow-top"><span class="mrow-name">' + esc(m.name) + '</span>' +
    '<span class="tierchip ' + m.tier + '">' + m.tier + '</span></div>' +
    '<div class="mrow-bottom"><span class="mrow-coin">' + coin + '</span>' +
    '<span class="wrbar"><span class="wrfill ' + m.tier + '" style="width:' + wrWidth(m.wr) + '%"></span></span>' +
    '<span class="wrlabel ' + m.tier + '">' + esc(m.wr) + '</span></div></button>';
}

function buildList() {
  const ms = DECKS[currentDeck].matchups;
  const f = searchText.toLowerCase();
  let filtered = ms.filter(function (m) { return m.name.toLowerCase().indexOf(f) !== -1; });
  if (tierFilter !== 'all') filtered = filtered.filter(function (m) { return m.tier === tierFilter; });
  const val = function (s) { const n = wrNum(s); return n == null ? -1 : n; };
  const tiers = { S: [], A: [], C: [] };
  filtered.forEach(function (m) { tiers[m.tier].push(m); });
  ['S', 'A', 'C'].forEach(function (t) { tiers[t].sort(function (a, b) { return val(b.wr) - val(a.wr); }); });
  const labels = { S: '🏆 Tier S — vitória provável', A: '⚖️ Tier A — equilibrado', C: '🔴 Tier C — difícil' };
  let out = '';
  ['S', 'A', 'C'].forEach(function (t) {
    if (tiers[t].length) {
      out += '<div class="tier-h ' + t + '">' + labels[t] + '</div>';
      tiers[t].forEach(function (m) { out += matchupRow(m); });
    }
  });
  return filtered.length ? out : '<div class="empty">Nenhum matchup encontrado.</div>';
}

function setTier(t) {
  tierFilter = (tierFilter === t ? 'all' : t);
  const chips = document.querySelectorAll('.chip');
  for (let i = 0; i < chips.length; i++) chips[i].classList.toggle('active', chips[i].dataset.t === tierFilter);
  document.getElementById('mlist').innerHTML = buildList();
}

function renderHome() {
  selectedId = null;
  const chip = function (t, txt) {
    return '<button class="chip' + (tierFilter === t ? ' active' : '') + '" data-t="' + t + '" onclick="setTier(\'' + t + '\')">' + txt + '</button>';
  };
  document.getElementById('screen').innerHTML =
    '<div class="searchwrap"><input id="search" type="text" placeholder="Buscar oponente..." value="' + esc(searchText) + '"></div>' +
    '<div class="chips">' + chip('all', 'Todos') + chip('S', 'S') + chip('A', 'A') + chip('C', 'C') + '</div>' +
    '<div id="mlist">' + buildList() + '</div>';
  document.getElementById('search').addEventListener('input', function (e) {
    searchText = e.target.value;
    document.getElementById('mlist').innerHTML = buildList();
  });
}

function renderMatchup(id) {
  selectedId = id;
  const m = DECKS[currentDeck].matchups.find(function (x) { return x.id === id; });
  if (!m) { renderHome(); return; }
  const obj = (m.objetivo || []).map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('');
  const cui = (m.cuidado || []).map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('');
  document.getElementById('screen').innerHTML =
    '<button class="back" onclick="renderHome()">← Voltar</button>' +
    '<div class="mhead"><div class="mtitle">' + esc(m.name) + '</div><div class="mbadges">' +
    '<span class="tierbadge ' + m.tier + '">Tier ' + m.tier + '</span>' +
    '<span class="pill ' + m.coinFlip + '">🪙 ' + coinText(m.coinFlip) + '</span>' +
    '<span class="pill">📈 Meta ' + esc(m.metaShare) + '</span></div></div>' +
    '<div class="wrcard"><div class="wrcard-top"><span class="lbl">Win rate</span>' +
    '<span class="wrbig ' + m.tier + '">' + esc(m.wr) + '</span></div>' +
    '<span class="wrbar big"><span class="wrfill ' + m.tier + '" style="width:' + wrWidth(m.wr) + '%"></span></span></div>' +
    (obj ? '<div class="sect obj"><div class="sect-h">🎯 Objetivo</div><ul>' + obj + '</ul></div>' : '') +
    (cui ? '<div class="sect cui"><div class="sect-h">⚠️ Cuidado</div><ul>' + cui + '</ul></div>' : '');
  window.scrollTo(0, 0);
}

function cardImg(setStr) {
  const parts = String(setStr).trim().split(/\s+/);
  if (parts.length < 2) return '';
  const set = parts[0].toUpperCase();
  const num = parts[1].replace(/\D/g, '').padStart(3, '0');
  return 'https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpci/' + set + '/' + set + '_' + num + '_R_EN_LG.png';
}

function showGallery() {
  selectedId = null;
  const dl = DECKS[currentDeck].decklist;
  let html = '<button class="back" onclick="renderHome()">← Voltar</button>';
  if (!dl) { document.getElementById('screen').innerHTML = html + '<div class="empty">Lista não cadastrada.</div>'; window.scrollTo(0, 0); return; }
  if (dl.note) html += '<div class="gal-note">' + dl.note + '</div>';
  dl.groups.forEach(function (g) {
    html += '<div class="dl-group"><div class="dl-cat">' + esc(g.type) + '</div><div class="gal-grid">';
    g.cards.forEach(function (c) {
      const url = cardImg(c.set);
      const fb = "this.parentNode.classList.add('gal-broken');this.parentNode.innerHTML='" + c.name.replace(/'/g, "\\'") + "<br>" + c.set + "'";
      html += '<div class="gal-imgwrap"><img loading="lazy" src="' + url + '" alt="' + esc(c.name) + '" title="' + esc(c.name) + ' (' + c.set + ')" onerror="' + fb + '"><span class="gal-count">' + c.n + '×</span></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('screen').innerHTML = html;
  window.scrollTo(0, 0);
}

if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', function () { navigator.serviceWorker.register('./sw.js').catch(function () {}); });
}

switchDeck(currentDeck);
